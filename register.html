<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR eSports - Create Account</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.register-box{
    width:350px;
    background:#1b1b1b;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(255,153,0,0.3);
}

h1{
    color:#ff9900;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#ff9900;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

a{
    color:#ff9900;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="register-box">

<h1>⚓ Create Account</h1>

<form id="registerForm">

<input
type="text"
id="ign"
placeholder="Enter In-Game Name"
required>

<input
type="password"
id="password"
placeholder="Create Password"
required>

<button type="submit">
Create Account
</button>

</form>

<br>

<a href="login.html">
Already have an account? Login
</a>

<br><br>

<a href="index.html">
⬅ Back Home
</a>

</div>

<script>

document.getElementById("registerForm")
.addEventListener("submit", function(e){

e.preventDefault();

const ign =
document.getElementById("ign").value;

const password =
document.getElementById("password").value;

// Save account locally

localStorage.setItem(
"memberIGN",
ign
);

localStorage.setItem(
"memberPassword",
password
);

// Redirect to login

window.location.href =
"login.html";

});

</script>

</body>
</html>
