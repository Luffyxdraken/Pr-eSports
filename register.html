<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - PR eSports</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    width:350px;
    background:#1b1b1b;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(255,153,0,.3);
}

h1{
    color:#ff9900;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#ff9900;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

a{
    color:#ff9900;
    text-decoration:none;
}

</style>
</head>
<body>

<div class="box">

<h1>⚓ Create Account</h1>

<form id="registerForm">

<input
type="text"
id="ign"
placeholder="In Game Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<select id="region">

<option value="India">India</option>
<option value="Bangladesh">Bangladesh</option>
<option value="Nepal">Nepal</option>
<option value="Pakistan">Pakistan</option>
<option value="Singapore">Singapore</option>

</select>

<button type="submit">
Create Account
</button>

</form>

<br>

<a href="login.html">
Already have an account? Login
</a>

<br><br>

<a href="index.html">
⬅ Back Home
</a>

</div>

<script type="module">

import { registerMember }
from "./auth.js";

document
.getElementById("registerForm")
.addEventListener("submit",
async(e)=>{

e.preventDefault();

const ign =
document.getElementById("ign").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const region =
document.getElementById("region").value;

await registerMember(
email,
password,
ign,
region
);

});

</script>

</body>
</html>
