<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Pr eSports </title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.register-box{
    width:350px;
    background:#1b1b1b;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(255,153,0,0.3);
}

h1{
    color:#ff9900;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#ff9900;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

a{
    color:#ff9900;
    text-decoration:none;
}

.note{
    color:#ccc;
    font-size:14px;
    margin-top:15px;
}

</style>
</head>
<body>

<div class="register-box">

<h1>⚓ Create Account</h1>

<form id="registerForm">

<input
type="text"
id="ign"
placeholder="In-Game Name"
required>

<input
type="password"
id="password"
placeholder="Create Password"
required>

<select id="server">

<option>India</option>
<option>Singapore</option>
<option>Bangladesh</option>
<option>Pakistan</option>

</select>

<button type="submit">
Create Account
</button>

</form>

<div class="note">
Create your account and join tournaments.
</div>

<br>

<a href="login.html">
Already have an account? Login
</a>

<br><br>

<a href="index.html">
⬅ Back Home
</a>

</div>

<script>

document
.getElementById("registerForm")
.addEventListener("submit",function(e){

e.preventDefault();

const ign =
document.getElementById("ign").value;

const password =
document.getElementById("password").value;

const server =
document.getElementById("server").value;

// Save Account

localStorage.setItem(
"memberIGN",
ign
);

localStorage.setItem(
"memberPassword",
password
);

localStorage.setItem(
"memberServer",
server
);

window.location.href =
"login.html";

});

</script>

</body>
</html>
