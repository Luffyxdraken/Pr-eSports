<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login - Pr Straw Hat</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#1b1b1b;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff9900;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:#ff9900;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="login-box">

<h1>⚓ Member Login</h1>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<br>

<a href="register.html">
Request Membership
</a>

<br><br>

<a href="index.html">
⬅ Back Home
</a>

</div>

<script type="module">

import { loginMember }
from "./auth.js";

document
.getElementById("loginForm")
.addEventListener("submit",
async (e)=>{

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

await loginMember(
email,
password
);

});

</script>

</body>
</html>
