<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR eSports Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
color:white;
}

.header{
background:#ff9900;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

h2{
color:#ff9900;
margin-top:0;
}

button{
background:#ff9900;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

#chatBox{
height:250px;
overflow-y:auto;
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.message{
background:#222;
padding:8px;
margin-bottom:8px;
border-radius:8px;
}
</style>
</head>
<body>

<div class="header">
⚓ PR eSports Dashboard
</div>

<div class="container">

<div class="card">
<h2>👋 Welcome</h2>
<p id="playerName">Loading...</p>
</div>

<div class="card">
<h2>🏆 Tournament</h2>
<p>Date: <span id="tourDate">Not Set</span></p>
<p>Time: <span id="tourTime">Not Set</span></p>
<p>Map: <span id="tourMap">Not Set</span></p>
</div>

<div class="card">
<h2>🔑 Room Details</h2>
<p>Room ID: <span id="roomId">Not Released</span></p>
<p>Password: <span id="roomPass">Not Released</span></p>
</div>

<div class="card">
<h2>📢 Announcement</h2>
<p id="announcement">No Announcement</p>
</div>

<div class="card">
<h2>🏅 Rankings</h2>
<p id="rank1">🥇 Empty</p>
<p id="rank2">🥈 Empty</p>
<p id="rank3">🥉 Empty</p>
</div>

<div class="card">
<h2>💬 Guild Chat</h2>

<div id="chatBox"></div>

<input
type="text"
id="chatInput"
placeholder="Type message">

<br><br>

<button id="sendBtn">
Send
</button>

</div>

<div class="card">
<h2>📺 YouTube</h2>

<a href="https://youtube.com/@luffy_69_ff?si=y2LNFTbWlxPmcPLS" target="_blank">
<button>
Subscribe To Luffy 69 FF
</button>
</a>

</div>

<div class="card">
<button id="logoutBtn">
Logout
</button>
</div>

</div>

<script type="module">

import {
db
} from "./firebase-config.js";

import {
logoutMember,
requireMember,
getCurrentUser
} from "./auth.js";

import {
collection,
addDoc,
orderBy,
query,
onSnapshot,
doc,
getDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

requireMember();

let currentUser = null;

/* USER */

getCurrentUser((user)=>{

if(!user) return;

currentUser = user;

document.getElementById(
"playerName"
).innerText =
"Welcome " + user.ign;

});

/* TOURNAMENT */

async function loadTournament(){

try{

const snap =
await getDoc(
doc(db,"tournament","current")
);

if(!snap.exists()) return;

const data = snap.data();

document.getElementById("tourDate").innerText =
data.date || "Not Set";

document.getElementById("tourTime").innerText =
data.time || "Not Set";

document.getElementById("tourMap").innerText =
data.map || "Not Set";

document.getElementById("roomId").innerText =
data.roomid || "Not Released";

document.getElementById("roomPass").innerText =
data.roompass || "Not Released";

}catch(err){
console.log(err);
}

}

/* ANNOUNCEMENT */

async function loadAnnouncement(){

try{

const snap =
await getDoc(
doc(db,"announcements","main")
);

if(!snap.exists()) return;

document.getElementById(
"announcement"
).innerText =
snap.data().text || "No Announcement";

}catch(err){
console.log(err);
}

}

/* RANKINGS */

async function loadRankings(){

try{

const snap =
await getDoc(
doc(db,"rankings","main")
);

if(!snap.exists()) return;

const data = snap.data();

document.getElementById("rank1").innerText =
"🥇 " + (data.rank1 || "Empty");

document.getElementById("rank2").innerText =
"🥈 " + (data.rank2 || "Empty");

document.getElementById("rank3").innerText =
"🥉 " + (data.rank3 || "Empty");

}catch(err){
console.log(err);
}

}

loadTournament();
loadAnnouncement();
loadRankings();

/* CHAT */

const chatBox =
document.getElementById("chatBox");

const q =
query(
collection(db,"guildChat"),
orderBy("time","asc")
);

onSnapshot(q,(snapshot)=>{

chatBox.innerHTML="";

snapshot.forEach((doc)=>{

const data = doc.data();

chatBox.innerHTML += `
<div class="message">
<b>${data.player}</b><br>
${data.message}
</div>
`;

});

chatBox.scrollTop =
chatBox.scrollHeight;

});

document
.getElementById("sendBtn")
.addEventListener("click",
async ()=>{

const msg =
document.getElementById(
"chatInput"
).value;

if(!msg || !currentUser) return;

await addDoc(
collection(db,"guildChat"),
{
player:currentUser.ign,
message:msg,
time:serverTimestamp()
}
);

document.getElementById(
"chatInput"
).value="";

});

/* LOGOUT */

document
.getElementById("logoutBtn")
.addEventListener("click",()=>{

logoutMember();

});

</script>

</body>
</html>
