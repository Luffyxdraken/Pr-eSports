<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR eSports Admin Panel</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
}

.header{
    background:#ff9900;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1b1b1b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(255,153,0,0.2);
}

h2{
    color:#ff9900;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#ff9900;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.player{
    background:#222;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}

.logout{
    background:red;
}

</style>
</head>
<body>

<div class="header">
⚓ PR eSports Admin Panel
</div>

<div class="container">

<div class="card">
<h2>🏆 Tournament Settings</h2>

<input type="date" id="date">

<input type="time" id="time">

<select id="map">
<option>Bermuda</option>
<option>Purgatory</option>
<option>Kalahari</option>
<option>Alpine</option>
<option>Nexterra</option>
</select>

<input
type="text"
id="roomid"
placeholder="Room ID">

<input
type="text"
id="roompassword"
placeholder="Room Password">

<button onclick="saveTournament()">
Save Tournament
</button>

</div>

<div class="card">

<h2>📢 Announcement</h2>

<textarea
id="announcement"
rows="5"
placeholder="Write announcement here...">
</textarea>

<button onclick="saveAnnouncement()">
Save Announcement
</button>

</div>

<div class="card">

<h2>🚫 Ban Player</h2>

<input
type="text"
id="banUser"
placeholder="Enter In Game Name">

<button onclick="banPlayer()">
Ban Player
</button>

</div>

<div class="card">

<h2>🏅 Rankings</h2>

<input
type="text"
id="rank1"
placeholder="Rank 1">

<input
type="text"
id="rank2"
placeholder="Rank 2">

<input
type="text"
id="rank3"
placeholder="Rank 3">

<button onclick="saveRankings()">
Save Rankings
</button>

</div>

<div class="card">

<h2>📋 Banned Players</h2>

<div id="bannedList">
No banned players.
</div>

</div>

<div class="card">

<button
class="logout"
onclick="logoutAdmin()">
Logout
</button>

</div>

</div>

<script>

// PASSWORD PROTECTION

const password = prompt(
"Enter Admin Password"
);

if(password !== "735208"){

alert("Wrong Password");

window.location.href =
"index.html";

}

// SAVE TOURNAMENT

function saveTournament(){

const data = {

date:
document.getElementById("date").value,

time:
document.getElementById("time").value,

map:
document.getElementById("map").value,

roomid:
document.getElementById("roomid").value,

roompassword:
document.getElementById("roompassword").value

};

localStorage.setItem(
"tournamentData",
JSON.stringify(data)
);

alert("Tournament Saved");

}

// ANNOUNCEMENT

function saveAnnouncement(){

localStorage.setItem(
"announcement",
document.getElementById(
"announcement"
).value
);

alert("Announcement Saved");

}

// RANKINGS

function saveRankings(){

const rankings = {

rank1:
document.getElementById(
"rank1"
).value,

rank2:
document.getElementById(
"rank2"
).value,

rank3:
document.getElementById(
"rank3"
).value

};

localStorage.setItem(
"rankings",
JSON.stringify(rankings)
);

alert("Rankings Saved");

}

// BAN PLAYER

function banPlayer(){

const player =
document.getElementById(
"banUser"
).value;

if(player === ""){

alert("Enter Player Name");

return;

}

let banned =
JSON.parse(
localStorage.getItem(
"bannedPlayers"
)
) || [];

banned.push(player);

localStorage.setItem(
"bannedPlayers",
JSON.stringify(banned)
);

loadBannedPlayers();

alert(player + " banned");

}

// LOAD BANNED PLAYERS

function loadBannedPlayers(){

let banned =
JSON.parse(
localStorage.getItem(
"bannedPlayers"
)
) || [];

const list =
document.getElementById(
"bannedList"
);

if(banned.length === 0){

list.innerHTML =
"No banned players.";

return;

}

list.innerHTML = "";

banned.forEach(player=>{

list.innerHTML +=

'<div class="player">'
+ player +
'</div>';

});

}

function logoutAdmin(){

window.location.href =
"index.html";

}

loadBannedPlayers();

</script>

</body>
</html>
