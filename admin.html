<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR eSports Admin Panel</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
color:white;
}

.header{
background:#ff9900;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#ff9900;
color:white;
border:none;
padding:12px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

h2{
color:#ff9900;
}

.member{
background:#222;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>
<body>

<div class="header">
👑 PR eSports Admin Panel
</div>

<div class="container">

<div class="card">

<h2>🏆 Tournament Settings</h2>

<input
type="date"
id="date">

<input
type="time"
id="time">

<select id="map">
<option>Bermuda</option>
<option>Purgatory</option>
<option>Kalahari</option>
<option>Alpine</option>
<option>Nexterra</option>
</select>

<input
type="text"
id="roomid"
placeholder="Room ID">

<input
type="text"
id="roompass"
placeholder="Room Password">

<button id="saveTournament">
Save Tournament
</button>

</div>

<div class="card">

<h2>📢 Announcement</h2>

<textarea
id="announcement"
rows="5"
placeholder="Write announcement">
</textarea>

<button id="saveAnnouncement">
Save Announcement
</button>

</div>

<div class="card">

<h2>🏅 Rankings</h2>

<input
type="text"
id="rank1"
placeholder="Rank 1">

<input
type="text"
id="rank2"
placeholder="Rank 2">

<input
type="text"
id="rank3"
placeholder="Rank 3">

<button id="saveRanks">
Save Rankings
</button>

</div>

<div class="card">

<h2>🚫 Ban Member</h2>

<input
type="text"
id="banUid"
placeholder="User UID">

<button id="banBtn">
Ban Member
</button>

</div>

<div class="card">

<h2>✅ Unban Member</h2>

<input
type="text"
id="unbanUid"
placeholder="User UID">

<button id="unbanBtn">
Unban Member
</button>

</div>

<div class="card">

<h2>📺 YouTube Channel</h2>

<p>
https://youtube.com/@luffy_69_ff
</p>

</div>

<div class="card">

<button id="logoutBtn">
Logout
</button>

</div>

</div>

<script type="module">

import {
requireAdmin,
logoutMember,
banMember,
unbanMember
}
from "./auth.js";

import {
db
}
from "./firebase-config.js";

import {
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

requireAdmin();

document
.getElementById("logoutBtn")
.addEventListener("click",()=>{

logoutMember();

});

document
.getElementById("saveTournament")
.addEventListener("click",
async()=>{

await setDoc(
doc(db,"tournament","current"),
{
date:
document.getElementById("date").value,

time:
document.getElementById("time").value,

map:
document.getElementById("map").value,

roomid:
document.getElementById("roomid").value,

roompass:
document.getElementById("roompass").value
}
);

alert("Tournament Saved");

});

document
.getElementById("saveAnnouncement")
.addEventListener("click",
async()=>{

await setDoc(
doc(db,"announcements","main"),
{
text:
document.getElementById("announcement").value
}
);

alert("Announcement Saved");

});

document
.getElementById("saveRanks")
.addEventListener("click",
async()=>{

await setDoc(
doc(db,"rankings","main"),
{
rank1:
document.getElementById("rank1").value,

rank2:
document.getElementById("rank2").value,

rank3:
document.getElementById("rank3").value
}
);

alert("Rankings Saved");

});

document
.getElementById("banBtn")
.addEventListener("click",()=>{

const uid =
document.getElementById("banUid").value;

banMember(uid);

});

document
.getElementById("unbanBtn")
.addEventListener("click",()=>{

const uid =
document.getElementById("unbanUid").value;

unbanMember(uid);

});

</script>

</body>
</html>
