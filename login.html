<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR eSports Login</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.login-box{
    width:350px;
    background:#1b1b1b;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(255,153,0,0.3);
}

h1{
    color:#ff9900;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#ff9900;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

a{
    color:#ff9900;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

<h1>⚓ PR eSports Login</h1>

<form id="loginForm">

<input
type="text"
id="ign"
placeholder="Enter In-Game Name"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

</form>

<br>

<a href="register.html">
Create Account
</a>

<br><br>

<a href="index.html">
⬅ Back Home
</a>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

const ign =
document.getElementById("ign").value;

const password =
document.getElementById("password").value;

const savedIGN =
localStorage.getItem("memberIGN");

const savedPassword =
localStorage.getItem("memberPassword");

if(
ign === savedIGN &&
password === savedPassword
){

localStorage.setItem(
"loggedIn",
"true"
);

window.location.href =
"member.html";

}else{

alert("Wrong IGN or Password");

}

});

</script>

</body>
</html>
